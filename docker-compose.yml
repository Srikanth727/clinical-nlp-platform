services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -inMemory"
    ports:
      - "8000:8000"
    working_dir: /home/dynamodblocal
    # Amazon Linux image has curl; /shell/ returns 400 when DynamoDB is up
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ > /dev/null 2>&1 && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    depends_on:
      - dynamodb-local

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      # Webhook target: MinIO calls this whenever a file is PUT
      MINIO_NOTIFY_WEBHOOK_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_PRIMARY: "http://backend:8080/document/process"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    # mc is bundled in recent MinIO server images
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # One-shot init: creates the uploads bucket and enables PUT-event webhook
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Configuring MinIO...';
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123};
        mc mb --ignore-existing local/uploads;
        mc event add local/uploads arn:minio:sqs::PRIMARY:webhook --event put 2>/dev/null || true;
        echo 'MinIO init complete.';
      "

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      # Ollama runs on the host machine; host.docker.internal resolves to it on Mac/Windows
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minio}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio123}
      - S3_BUCKET=uploads
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure
    # curl is installed in the backend Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/docs"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_BASE_URL is baked into the JS bundle at build time.
        # The browser reaches the backend directly on the host at localhost:8080.
        - VITE_API_BASE_URL=http://localhost:8080
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  minio_data:
